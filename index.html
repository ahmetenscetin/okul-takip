<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ödev Takip Paneli | Öğretmen</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);color:#fff;padding:20px;min-height:100vh}
.wrap{max-width:900px;margin:auto}
.hero{padding:24px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:18px}
.card{background:rgba(255,255,255,.08);padding:18px;border-radius:22px;backdrop-filter:blur(8px);margin-bottom:16px}
h1{margin:0 0 8px;font-size:28px}
h2{margin-top:0;font-size:19px;color:#22d3ee}
.muted{color:#d1d5db;font-size:14px}
input,button,textarea{width:100%;padding:12px;border-radius:14px;border:none;margin-top:10px;font-size:15px;font-family:inherit}
input,textarea{background:#e5e7eb;color:#000}
button{background:#22d3ee;font-weight:700;cursor:pointer;color:#0f172a}
button.secondary{background:#334155;color:#fff}
button.danger{background:#ef4444;color:#fff}
.row{display:flex;gap:10px}
.row>*{flex:1}
.hidden{display:none !important}
.student-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);gap:10px}
.student-row span{flex:1}
.pct-badge{padding:4px 10px;border-radius:999px;background:#334155;font-size:13px;font-weight:700}
.assignment-block{border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:14px;margin-top:12px}
.assignment-student{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center;margin-top:8px}
.assignment-student input{margin-top:0}
.assignment-note{margin-top:8px}
.err{color:#fca5a5;font-size:14px;margin-top:8px}
.link-btn{background:none;color:#22d3ee;text-decoration:underline;width:auto;padding:0;margin-top:12px;font-size:14px}
.topbar{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="wrap">

  <!-- GİRİŞ / KAYIT EKRANI -->
  <div id="authScreen">
    <div class="hero">
      <h1>Ödev Takip Paneli</h1>
      <div class="muted">Öğretmen Girişi</div>
    </div>
    <div class="card">
      <h2 id="authTitle">Giriş Yap</h2>
      <input type="email" id="authEmail" placeholder="E-posta">
      <input type="password" id="authPassword" placeholder="Şifre">
      <button onclick="handleAuth()">Giriş Yap</button>
      <button class="link-btn" onclick="toggleAuthMode()" id="toggleModeBtn">Hesabın yok mu? Kayıt ol</button>
      <div id="authError" class="err"></div>
    </div>
  </div>

  <!-- ÖĞRETMEN PANELİ -->
  <div id="dashboard" class="hidden">
    <div class="hero topbar">
      <div>
        <h1>Ödev Takip Paneli</h1>
        <div class="muted" id="userEmailLabel"></div>
      </div>
      <button class="secondary" style="width:auto;padding:10px 16px" onclick="handleLogout()">Çıkış</button>
    </div>

    <div class="card">
      <h2>👤 Öğrenci Ekle</h2>
      <div class="row">
        <input type="text" id="newStudentName" placeholder="Öğrenci adı soyadı">
        <button style="max-width:140px" onclick="addStudent()">Ekle</button>
      </div>
    </div>

    <div class="card">
      <h2>📋 Öğrenciler ve Başarı Yüzdeleri</h2>
      <div id="studentsList" class="muted">Yükleniyor...</div>
    </div>

    <div class="card">
      <h2>📝 Yeni Ödev</h2>
      <div class="row">
        <input type="text" id="newAssignmentTitle" placeholder="Ödev adı (örn: Sayfa 45 Testleri)">
        <button style="max-width:140px" onclick="addAssignment()">Ödev Aç</button>
      </div>
    </div>

    <div class="card">
      <h2>📚 Ödevler</h2>
      <div id="assignmentsList" class="muted">Yükleniyor...</div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, collection, addDoc,
  onSnapshot, updateDoc, deleteDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHT6dH7LdXlZIh0htt2m5DDSYw9IC4SRM",
  authDomain: "okul-takip-platformu.firebaseapp.com",
  projectId: "okul-takip-platformu",
  storageBucket: "okul-takip-platformu.firebasestorage.app",
  messagingSenderId: "743250447544",
  appId: "1:743250447544:web:03d78e46d0347ecc23f84d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isRegisterMode = false;
let currentUser = null;
let studentsCache = [];       // {id, name}
let assignmentsCache = [];    // {id, title, completions: {studentId: {pct, note}}}
let unsubStudents = null;
let unsubAssignments = null;

// ---------- AUTH ----------
window.toggleAuthMode = function() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('authTitle').textContent = isRegisterMode ? "Kayıt Ol" : "Giriş Yap";
  document.querySelector('#authScreen button[onclick="handleAuth()"]').textContent = isRegisterMode ? "Kayıt Ol" : "Giriş Yap";
  document.getElementById('toggleModeBtn').textContent = isRegisterMode ? "Zaten hesabın var mı? Giriş yap" : "Hesabın yok mu? Kayıt ol";
  document.getElementById('authError').textContent = "";
};

window.handleAuth = async function() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = "";

  if (!email || !password) { errEl.textContent = "E-posta ve şifre gerekli."; return; }

  try {
    if (isRegisterMode) {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "teachers", cred.user.uid), {
        email: email,
        isPaid: false,
        createdAt: new Date().toISOString()
      });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch (e) {
    errEl.textContent = translateFirebaseError(e.code);
  }
};

window.handleLogout = function() {
  signOut(auth);
};

function translateFirebaseError(code) {
  const map = {
    "auth/email-already-in-use": "Bu e-posta zaten kayıtlı.",
    "auth/invalid-email": "Geçersiz e-posta adresi.",
    "auth/weak-password": "Şifre en az 6 karakter olmalı.",
    "auth/user-not-found": "Kullanıcı bulunamadı.",
    "auth/wrong-password": "Şifre hatalı.",
    "auth/invalid-credential": "E-posta veya şifre hatalı."
  };
  return map[code] || ("Hata: " + code);
}

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('userEmailLabel').textContent = user.email;
    listenStudents();
    listenAssignments();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    if (unsubStudents) unsubStudents();
    if (unsubAssignments) unsubAssignments();
  }
});

// ---------- STUDENTS ----------
window.addStudent = async function() {
  const nameInput = document.getElementById('newStudentName');
  const name = nameInput.value.trim();
  if (!name) return;
  await addDoc(collection(db, "teachers", currentUser.uid, "students"), {
    name: name,
    createdAt: new Date().toISOString()
  });
  nameInput.value = "";
};

window.deleteStudent = async function(studentId) {
  if (!confirm("Bu öğrenciyi silmek istediğine emin misin?")) return;
  await deleteDoc(doc(db, "teachers", currentUser.uid, "students", studentId));
};

function listenStudents() {
  const q = query(collection(db, "teachers", currentUser.uid, "students"), orderBy("createdAt", "asc"));
  unsubStudents = onSnapshot(q, (snap) => {
    studentsCache = [];
    snap.forEach(d => studentsCache.push({ id: d.id, ...d.data() }));
    renderStudents();
    renderAssignments();
  });
}

function calcAverage(studentId) {
  const pcts = assignmentsCache
    .map(a => a.completions && a.completions[studentId] ? a.completions[studentId].pct : null)
    .filter(p => p !== null && p !== undefined);
  if (pcts.length === 0) return null;
  const sum = pcts.reduce((a,b) => a + Number(b), 0);
  return Math.round(sum / pcts.length);
}

function renderStudents() {
  const el = document.getElementById('studentsList');
  if (studentsCache.length === 0) {
    el.innerHTML = "Henüz öğrenci eklenmedi.";
    return;
  }
  el.innerHTML = "";
  studentsCache.forEach(s => {
    const avg = calcAverage(s.id);
    const row = document.createElement('div');
    row.className = 'student-row';
    row.innerHTML = `
      <span>${escapeHtml(s.name)}</span>
      <span class="pct-badge">${avg === null ? '—' : avg + '%'}</span>
      <button class="danger" style="width:auto;padding:6px 12px;margin:0" onclick="deleteStudent('${s.id}')">Sil</button>
    `;
    el.appendChild(row);
  });
}

// ---------- ASSIGNMENTS ----------
window.addAssignment = async function() {
  const titleInput = document.getElementById('newAssignmentTitle');
  const title = titleInput.value.trim();
  if (!title) return;
  await addDoc(collection(db, "teachers", currentUser.uid, "assignments"), {
    title: title,
    createdAt: new Date().toISOString(),
    completions: {}
  });
  titleInput.value = "";
};

window.deleteAssignment = async function(assignmentId) {
  if (!confirm("Bu ödevi silmek istediğine emin misin?")) return;
  await deleteDoc(doc(db, "teachers", currentUser.uid, "assignments", assignmentId));
};

window.saveAssignment = async function(assignmentId) {
  const completions = {};
  studentsCache.forEach(s => {
    const pctInput = document.getElementById(`pct-${assignmentId}-${s.id}`);
    const noteInput = document.getElementById(`note-${assignmentId}-${s.id}`);
    const pctVal = pctInput.value === "" ? null : Math.max(0, Math.min(100, Number(pctInput.value)));
    completions[s.id] = { pct: pctVal, note: noteInput.value.trim() };
  });
  await updateDoc(doc(db, "teachers", currentUser.uid, "assignments", assignmentId), { completions });
  alert("Kaydedildi.");
};

function listenAssignments() {
  const q = query(collection(db, "teachers", currentUser.uid, "assignments"), orderBy("createdAt", "desc"));
  unsubAssignments = onSnapshot(q, (snap) => {
    assignmentsCache = [];
    snap.forEach(d => assignmentsCache.push({ id: d.id, ...d.data() }));
    renderAssignments();
    renderStudents();
  });
}

function renderAssignments() {
  const el = document.getElementById('assignmentsList');
  if (assignmentsCache.length === 0) {
    el.innerHTML = "Henüz ödev eklenmedi.";
    return;
  }
  if (studentsCache.length === 0) {
    el.innerHTML = "Ödevleri işaretlemek için önce öğrenci ekle.";
    return;
  }
  el.innerHTML = "";
  assignmentsCache.forEach(a => {
    const block = document.createElement('div');
    block.className = 'assignment-block';
    let studentsHtml = "";
    studentsCache.forEach(s => {
      const existing = (a.completions && a.completions[s.id]) || {};
      const pct = existing.pct ?? "";
      const note = existing.note ?? "";
      studentsHtml += `
        <div class="assignment-student">
          <span>${escapeHtml(s.name)}</span>
          <input type="number" min="0" max="100" placeholder="%" id="pct-${a.id}-${s.id}" value="${pct}">
        </div>
        <textarea class="assignment-note" rows="1" placeholder="Öğretmen notu (öğrenci görmez)" id="note-${a.id}-${s.id}">${escapeHtml(note)}</textarea>
      `;
    });
    block.innerHTML = `
      <div class="topbar">
        <b>${escapeHtml(a.title)}</b>
        <button class="danger" style="width:auto;padding:6px 12px;margin:0" onclick="deleteAssignment('${a.id}')">Sil</button>
      </div>
      ${studentsHtml}
      <button style="margin-top:12px" onclick="saveAssignment('${a.id}')">Kaydet</button>
    `;
    el.appendChild(block);
  });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? "";
  return d.innerHTML;
}
</script>
</body>
</html>
